<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Butterdrop TV</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #status {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #eee;
      font: 400 22px/1.5 "Segoe UI", sans-serif;
      text-align: center;
      background: radial-gradient(circle at center, #14101f 0%, #000 75%);
      cursor: pointer;
    }
    #status .title {
      font-size: 34px;
      font-weight: 600;
      background: linear-gradient(90deg, #a855f7, #22d3ee);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    #status .sub {
      color: rgba(255, 255, 255, 0.6);
      font-size: 18px;
    }
    #status.hidden {
      display: none;
    }
    #toast {
      position: absolute;
      top: 20px;
      left: 24px;
      color: rgba(255, 255, 255, 0.8);
      font: 500 14px/1.4 "Segoe UI", sans-serif;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    #toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status">
    <div class="title">Butterdrop TV</div>
    <div class="sub" id="status-text">Tap / click / press OK to start</div>
  </div>
  <div id="toast"></div>
  <script src="/lib/butterchurn.min.js"></script>
  <script src="/lib/butterchurnPresets.min.js"></script>
  <script src="/lib/butterchurnPresetsExtra.min.js"></script>
  <script src="/lib/butterchurnPresetsExtra2.min.js"></script>
  <script src="/tv.js"></script>
</body>
</html>
