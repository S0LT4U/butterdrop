<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0a0a10" />
  <title>Butterdrop Remote</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0a10;
      color: #eee;
      font: 400 17px/1.5 "Segoe UI", system-ui, sans-serif;
      min-height: 100%;
    }
    .wrap {
      max-width: 420px;
      margin: 0 auto;
      padding: 28px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 4px;
      background: linear-gradient(90deg, #a855f7, #22d3ee);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
    }
    .section-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      margin: 12px 2px 0;
    }
    .section-label:first-of-type {
      margin-top: 0;
    }
    .row {
      display: flex;
      gap: 14px;
    }
    button {
      flex: 1;
      padding: 22px 10px;
      font: 600 18px "Segoe UI", system-ui, sans-serif;
      color: #fff;
      background: #1c1c28;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease, transform 0.05s ease;
    }
    button:active {
      background: linear-gradient(90deg, rgba(168, 85, 247, 0.45), rgba(34, 211, 238, 0.35));
      transform: scale(0.98);
    }
    button.accent {
      background: linear-gradient(90deg, rgba(168, 85, 247, 0.3), rgba(34, 211, 238, 0.22));
    }
    #status {
      text-align: center;
      color: rgba(255, 255, 255, 0.45);
      font-size: 14px;
      min-height: 21px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Butterdrop Remote</h1>

    <div class="section-label">Music</div>
    <div class="row">
      <button data-action="media-prev">⏮</button>
      <button data-action="media-playpause" class="accent">⏯ Play / Pause</button>
      <button data-action="media-next">⏭</button>
    </div>
    <div class="row">
      <button data-action="media-voldown">🔉 Vol −</button>
      <button data-action="media-volup">🔊 Vol +</button>
      <button data-action="media-mute">🔇 Mute</button>
    </div>

    <div class="section-label">Visualizer</div>
    <div class="row">
      <button data-action="prev">⏮ Prev preset</button>
      <button data-action="next" class="accent">Next preset ⏭</button>
    </div>
    <div class="row">
      <button data-action="sound-on">🔊 TV Sound On</button>
      <button data-action="sound-off">🔇 TV Sound Off</button>
    </div>

    <div class="section-label">Cast</div>
    <div class="row">
      <button data-action="cast" class="accent">📺 Cast to TV</button>
      <button data-action="stopcast">⏹ Stop Cast</button>
    </div>
    <div id="status"></div>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('t') || '';
    const status = document.getElementById('status');
    let statusTimer = null;

    document.querySelectorAll('button').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const action = btn.dataset.action;
        try {
          const res = await fetch(`/control?t=${token}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action }),
          });
          status.textContent = res.ok ? `✓ ${btn.textContent.trim()}` : `Error ${res.status}`;
        } catch (err) {
          status.textContent = 'Connection failed';
        }
        clearTimeout(statusTimer);
        statusTimer = setTimeout(() => (status.textContent = ''), 2000);
      });
    });
  </script>
</body>
</html>
