<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Butterdrop TV</title>
  <style>
    html, body { margin: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
    #v { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #000; }
    #status {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.6); font: 22px "Segoe UI", sans-serif;
      background: radial-gradient(circle at center, #14101f 0%, #000 75%);
    }
    #status.hidden { display: none; }
  </style>
</head>
<body>
  <video id="v" autoplay playsinline></video>
  <div id="status">Connecting to Butterdrop…</div>
  <script src="/tv-video.js"></script>
</body>
</html>
